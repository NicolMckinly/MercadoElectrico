name: Sistema Mercado Electrico
on:
  workflow_dispatch:
jobs:
  ejecutar_sistema:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: |
          pip install pandas==2.2.3 pydataxm matplotlib reportlab python-dotenv requests openpyxl beautifulsoup4 holidays
      - name: Crear archivo de credenciales
        run: |
          echo "CORREO_DESTINO=${{ secrets.CORREO_DESTINO }}" >> .env
          echo "CORREO_REMITENTE=${{ secrets.CORREO_REMITENTE }}" >> .env
          echo "CORREO_CONTRASENA_APP=${{ secrets.CORREO_CONTRASENA_APP }}" >> .env
          echo "RUTA_BASE_DATOS=BaseDatos/mercado_electrico.db" >> .env
      - name: BACKFILL - Precio de Bolsa 365 dias
        run: python API/backfill_precio_bolsa_anual.py
      - name: Guardar avance (precio de bolsa)
        run: |
          git config --global user.name "Sistema Automatico"
          git config --global user.email "sistema@mercadoelectrico.local"
          git config --global pull.rebase false
          git add -f BaseDatos/mercado_electrico.db
          git commit -m "Backfill precio de bolsa 365 dias" || echo "Sin cambios"
          git pull origin master --no-edit -X ours
          git push
      - name: BACKFILL - Variables Hidrologicas 365 dias
        run: python API/backfill_variables_hidrologicas_anual.py
      - name: Guardar avance (hidrologico)
        run: |
          git config --global user.name "Sistema Automatico"
          git config --global user.email "sistema@mercadoelectrico.local"
          git config --global pull.rebase false
          git add -f BaseDatos/mercado_electrico.db
          git commit -m "Backfill variables hidrologicas 365 dias" || echo "Sin cambios"
          git pull origin master --no-edit -X ours
          git push
      - name: BACKFILL - Generacion por Fuente 365 dias
        run: python API/backfill_generacion_anual.py
      - name: Guardar avance (generacion)
        run: |
          git config --global user.name "Sistema Automatico"
          git config --global user.email "sistema@mercadoelectrico.local"
          git config --global pull.rebase false
          git add -f BaseDatos/mercado_electrico.db
          git commit -m "Backfill generacion por fuente 365 dias" || echo "Sin cambios"
          git pull origin master --no-edit -X ours
          git push
