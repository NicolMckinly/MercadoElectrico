name: Sistema Mercado Electrico
# Este workflow ya NO se dispara con el "schedule" interno de GitHub
# (no era confiable con intervalos cortos). Ahora se dispara desde un
# servicio externo (cron-job.org) que llama a este workflow cada 15
# minutos usando "workflow_dispatch".
on:
  # Esto permite ejecutarlo manualmente desde GitHub (boton "Run workflow"),
  # y tambien es lo que usa el cron externo para dispararlo automaticamente.
  workflow_dispatch:
jobs:
  ejecutar_sistema:
    runs-on: ubuntu-latest
    steps:
      # Paso 1: Descarga una copia del codigo del repositorio
      - name: Descargar el codigo
        uses: actions/checkout@v4
      # Paso 2: Instala Python en la maquina virtual de GitHub
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # Paso 3: Instala todas las librerias que el proyecto necesita
      - name: Instalar dependencias
        run: |
          pip install pandas==2.2.3 pydataxm matplotlib reportlab python-dotenv requests openpyxl beautifulsoup4
      # Paso 4: Crea el archivo .env con las credenciales guardadas
      # de forma segura en los "Secrets" de GitHub (nunca quedan
      # visibles en el codigo ni en los registros de ejecucion).
      - name: Crear archivo de credenciales
        run: |
          echo "CORREO_DESTINO=${{ secrets.CORREO_DESTINO }}" >> .env
          echo "CORREO_REMITENTE=${{ secrets.CORREO_REMITENTE }}" >> .env
          echo "CORREO_CONTRASENA_APP=${{ secrets.CORREO_CONTRASENA_APP }}" >> .env
          echo "RUTA_BASE_DATOS=BaseDatos/mercado_electrico.db" >> .env
      # Paso 5: Ejecuta el proceso diario (Modulo 1) - todos los dias
      - name: Ejecutar proceso diario
        run: python main_diario.py
      # Paso 6: FORZADO TEMPORALMENTE para probar hoy - luego hay que
      # devolverlo a la version con el control de dia y hora.
      - name: Ejecutar proceso hidrologico (martes y jueves)
        run: python main_hidrologico.py
      # Paso 6.5: Revisa si hoy corresponde enviar el Resumen
      # Ejecutivo Quincenal (Modulo 6). Solo actua los dias 15 y el
      # ultimo dia de cada mes; cualquier otro dia no hace nada.
      - name: Revisar Resumen Ejecutivo Quincenal
        run: python main_ejecutivo.py
      # Paso 7: Guarda los cambios en la base de datos y los informes
      # generados, subiendolos de vuelta al repositorio, para que el
      # historico nunca se pierda entre una ejecucion y otra.
      - name: Guardar cambios en el repositorio
        run: |
          git config --global user.name "Sistema Automatico"
          git config --global user.email "sistema@mercadoelectrico.local"
          git add -f BaseDatos/mercado_electrico.db Reportes/*.pdf Graficas/*.png
          git commit -m "Actualizacion automatica $(date +'%Y-%m-%d %H:%M')" || echo "No hay cambios nuevos para guardar"
          git pull --rebase origin master
          git push
