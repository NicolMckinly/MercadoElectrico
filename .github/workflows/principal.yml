name: Sistema Mercado Electrico
on:
  workflow_dispatch:
jobs:
  ejecutar_sistema:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: |
          pip install pandas==2.2.3 pydataxm matplotlib reportlab python-dotenv requests openpyxl beautifulsoup4 holidays
      - name: Crear archivo de credenciales
        run: |
          echo "CORREO_DESTINO=${{ secrets.CORREO_DESTINO }}" >> .env
          echo "CORREO_REMITENTE=${{ secrets.CORREO_REMITENTE }}" >> .env
          echo "CORREO_CONTRASENA_APP=${{ secrets.CORREO_CONTRASENA_APP }}" >> .env
          echo "RUTA_BASE_DATOS=BaseDatos/mercado_electrico.db" >> .env
      - name: PRUEBA - Regenerar informe diario
        run: python Reportes/generar_informe_diario.py
      - name: Ejecutar proceso diario
        run: python main_diario.py
      - name: Ejecutar proceso hidrologico (martes y jueves)
        run: |
          DIA=$(date -u +%u)
          HORA=$(date -u +%H)
          if { [ "$DIA" = "2" ] || [ "$DIA" = "4" ]; } && [ "$HORA" -ge "13" ] && [ "$HORA" -lt "17" ]; then
            python main_hidrologico.py
          else
            echo "No corresponde ejecutar el proceso hidrologico en este momento."
          fi
      - name: Revisar Resumen Ejecutivo Quincenal
        run: python main_ejecutivo.py
      - name: Guardar cambios en el repositorio
        run: |
          git config --global user.name "Sistema Automatico"
          git config --global user.email "sistema@mercadoelectrico.local"
          git config --global pull.rebase false
          git add -f BaseDatos/mercado_electrico.db Reportes/*.pdf Graficas/*.png
          git commit -m "Actualizacion automatica $(date +'%Y-%m-%d %H:%M')" || echo "No hay cambios nuevos para guardar"
          git pull origin master --no-edit -X ours
          git push
